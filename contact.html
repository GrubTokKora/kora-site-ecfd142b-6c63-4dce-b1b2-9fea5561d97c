<body class="bg-white text-gray-800 font-sans antialiased">

  <main>
    <!-- Contact Header -->
    <section class="py-16 bg-brand-light">
      <div class="max-w-4xl mx-auto px-4 text-center">
        <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-4 reveal">Contact us</h1>
        <p class="text-xl text-gray-600 reveal delay-100">Prime power devices</p>
      </div>
    </section>

    <!-- Contact Form -->
    <section class="py-16 bg-white">
      <div class="max-w-xl mx-auto px-4 sm:px-6 lg:px-8">
        <form id="contact-form" class="space-y-6 reveal" onsubmit="handleFormSubmit(event, 'contact-form')" novalidate>
          <p id="contact-form-message" class="text-sm text-center min-h-[1.25rem]" role="status" aria-live="polite"></p>
          <div>
            <label for="contact-name" class="sr-only">Name</label>
            <input id="contact-name" name="name" type="text" placeholder="Enter your name" required autocomplete="name"
              class="w-full px-5 py-4 border-b-2 border-gray-200 bg-transparent focus:outline-none focus:border-brand-blue transition-colors text-gray-800 placeholder-gray-400">
          </div>
          <div>
            <label for="contact-phone" class="sr-only">Mobile number</label>
            <input id="contact-phone" name="phone" type="tel" placeholder="Enter your mobile no" required
              autocomplete="tel"
              class="w-full px-5 py-4 border-b-2 border-gray-200 bg-transparent focus:outline-none focus:border-brand-blue transition-colors text-gray-800 placeholder-gray-400">
          </div>
          <div>
            <label for="contact-email" class="sr-only">Email</label>
            <input id="contact-email" name="email" type="email" placeholder="Enter your Mail" required
              autocomplete="email"
              class="w-full px-5 py-4 border-b-2 border-gray-200 bg-transparent focus:outline-none focus:border-brand-blue transition-colors text-gray-800 placeholder-gray-400">
          </div>
          <div>
            <label for="contact-query" class="sr-only">Your query</label>
            <input id="contact-query" name="query" type="text" placeholder="Enter your Query" required
              autocomplete="off"
              class="w-full px-5 py-4 border-b-2 border-gray-200 bg-transparent focus:outline-none focus:border-brand-blue transition-colors text-gray-800 placeholder-gray-400">
          </div>
          <div id="contact-recaptcha" class="flex justify-center"></div>
          <div class="pt-4 text-center">
            <button type="submit" id="contact-submit-btn"
              class="btn-shine px-12 py-4 bg-gray-900 text-white font-semibold rounded-full hover:bg-gray-800 transition-colors shadow-lg disabled:opacity-60 disabled:cursor-not-allowed">
              SUBMIT
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- Address & Map -->
    <section class="py-16 bg-brand-light">
