<script>
(function () {
  var koraUrl = "https://askkora.ai";
  var muted = "#64748b";
  var blue = "#1E88E5";
  var purple = "#7B1FA2";
  var startMarker = 'KORA_' + 'BRANDING_FOOTER_START';
  var endMarker = 'KORA_' + 'BRANDING_FOOTER_END';
  var selector = '[data-kora-branding-footer="true"], .kora-powered-by';

  function removeExisting() {
    document.querySelectorAll(selector).forEach(function (node) {
      if (node && node.parentNode) node.parentNode.removeChild(node);
    });
    var walker = document.createTreeWalker(document.documentElement, NodeFilter.SHOW_COMMENT);
    var comments = [];
    while (walker.nextNode()) {
      if (walker.currentNode.nodeValue.indexOf(startMarker) !== -1 || walker.currentNode.nodeValue.indexOf(endMarker) !== -1) {
        comments.push(walker.currentNode);
      }
    }
    comments.forEach(function (node) {
      if (node && node.parentNode) node.parentNode.removeChild(node);
    });
  }

  function buildBranding() {
    var wrapper = document.createElement('div');
    wrapper.className = 'kora-powered-by';
    wrapper.setAttribute('data-kora-branding-footer', 'true');
    wrapper.style.cssText = 'display:flex;justify-content:flex-end;align-items:center;gap:0.35rem;padding:0.75rem 1rem;font-size:0.75rem;';
    wrapper.innerHTML = '<span style="color:' + muted + '">Powered by</span>' +
      '<a href="' + koraUrl + '" target="_blank" rel="noopener noreferrer" style="text-decoration:none;font-weight:600;background:linear-gradient(135deg,' + blue + ',' + purple + ');-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">Kora</a>';
    return wrapper;
  }

  function targetFooter(allowFallback) {
    var footer = document.querySelector('footer');
    if (footer) return footer;
    if (!allowFallback) return null;
    return document.getElementById('site-footer') || document.body;
  }

  function placeBranding(allowFallback) {
    var target = targetFooter(allowFallback);
    if (!target) return false;
    removeExisting();
    target.appendChild(document.createComment(' ' + startMarker + ' '));
    target.appendChild(buildBranding());
    target.appendChild(document.createComment(' ' + endMarker + ' '));
    return target.tagName && target.tagName.toLowerCase() === 'footer';
  }

  function start() {
    if (placeBranding(false)) return;
    var observer = new MutationObserver(function () {
      if (placeBranding(false)) observer.disconnect();
    });
    observer.observe(document.documentElement, { childList: true, subtree: true });
    window.setTimeout(function () { observer.disconnect(); placeBranding(true); }, 3000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
}());
</script>
